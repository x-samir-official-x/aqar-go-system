<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aqar-Go Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="frontend/css/style.css">
</head>

<body>

<div class="main-container">

    <!-- LEFT SIDE -->

    <div class="left-panel">

        <div class="overlay"></div>
        <div class="floating-shapes">

    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

        <div class="content">

            <img src="frontend/assets/logo.png" class="logo-large">

            <h1>Aqar-Go</h1>

            <h2>Real Estate Intelligence Platform</h2>

            <p>
                Collect. Analyze. Decide.
                All your real estate data in one place.
            </p>

            <div class="features">

                <div class="feature-card">
                    Secure Data Protection
                </div>

                <div class="feature-card">
                    Smart Analytics
                </div>

                <div class="feature-card">
                    Team Collaboration
                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-panel">

        <div class="login-card">

            <img src="frontend/assets/logo1.png" class="logo-small">

            <h2>Welcome Back</h2>

            <p>Sign in to your Aqar-Go account</p>

             <div class="status-badge">
    Secure Access
    </div>

            <input type="email"
                   id="email"
                   class="form-control mb-3"
                   placeholder="Email">

            <input type="password"
                   id="password"
                   class="form-control mb-3"
                   placeholder="Password">

            <div class="form-check mb-4">

                <input
                class="form-check-input"
                type="checkbox"
                id="rememberMe">

                <label class="form-check-label">
                    Remember Me
                </label>

            </div>

            <button onclick="login()"
                    class="btn login-btn w-100">
                Sign In
            </button>

            <p id="error"></p>

        </div>

    </div>

</div>
<script src="frontend/js/config.js"></script>
<script src="frontend/js/auth.js"></script>

</body>
</html>
